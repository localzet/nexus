version: "3.9"

services:
  nexus:
    build: .
    image: nexus:latest
    container_name: nexus-db
    ports:
      - "5433:5433"
    volumes:
      - nexus-data:/var/lib/nexus
      - ./config/nexus.toml.example:/etc/nexus/nexus.toml:ro
    environment:
      RUST_LOG: info
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "nc", "-zv", "localhost", "5433"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  nexus-data:
